<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1d4ed8">
<title>Elegí tu perfil — Trabajos Cerca</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f1f5f9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ══ HEADER ══ */
.header {
  background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
  padding: 20px 20px 22px;
  text-align: center;
  color: #fff;
}
.header-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 0;
}
.header-logo img {
  width: 42px; height: 42px;
  border-radius: 11px;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.header-logo span { font-size: 22px; font-weight: 800; }

/* ══ CONTENIDO ══ */
.wrap {
  flex: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 32px 16px 80px;
  width: 100%;
}

.bienvenida {
  text-align: center;
  margin-bottom: 28px;
}
.bienvenida h1 {
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 800;
  color: #1e293b;
  margin-bottom: 8px;
  line-height: 1.25;
}
.bienvenida p {
  font-size: 14px;
  color: #64748b;
  line-height: 1.6;
  max-width: 420px;
  margin: 0 auto;
}

/* ══ BOTONES DE TIPO ══ */
.tipos-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 28px;
}

.tipo-card {
  background: #fff;
  border: 2px solid #e2e8f0;
  border-radius: 14px;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: all .18s;
  text-align: left;
  width: 100%;
  position: relative;
  overflow: hidden;
}
.tipo-card::after {
  content: '\f054';
  font-family: 'Font Awesome 6 Free';
  font-weight: 900;
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: #cbd5e1;
  font-size: 13px;
  transition: color .15s, transform .15s;
}
.tipo-card:hover {
  border-color: var(--color);
  box-shadow: 0 4px 20px rgba(0,0,0,.08);
  transform: translateY(-1px);
}
.tipo-card:hover::after {
  color: var(--color);
  transform: translateY(-50%) translateX(3px);
}
.tipo-card:active { transform: scale(.99); }

/* Colores por tipo */
.tipo-card[data-tipo="oficio"]         { --color: #d97706; }
.tipo-card[data-tipo="profesional"]    { --color: #7c3aed; }
.tipo-card[data-tipo="cv"]             { --color: #dc2626; }
.tipo-card[data-tipo="emprendimiento"] { --color: #059669; }
.tipo-card[data-tipo="empresa"]        { --color: #0369a1; }

.tipo-ico {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.tipo-card[data-tipo="oficio"]         .tipo-ico { background: #fef3c7; color: #d97706; }
.tipo-card[data-tipo="profesional"]    .tipo-ico { background: #ede9fe; color: #7c3aed; }
.tipo-card[data-tipo="cv"]             .tipo-ico { background: #fee2e2; color: #dc2626; }
.tipo-card[data-tipo="emprendimiento"] .tipo-ico { background: #d1fae5; color: #059669; }
.tipo-card[data-tipo="empresa"]        .tipo-ico { background: #e0f2fe; color: #0369a1; }

.tipo-info { flex: 1; padding-right: 20px; }
.tipo-info strong {
  display: block;
  font-size: 16px;
  font-weight: 700;
  color: #1e293b;
  margin-bottom: 3px;
}
.tipo-info span {
  font-size: 13px;
  color: #64748b;
  line-height: 1.4;
}

/* Spinner de carga */
.cargando {
  text-align: center;
  padding: 60px 20px;
}
.spinner {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 4px solid #e2e8f0;
  border-top-color: #2563eb;
  animation: spin .7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.cargando p { font-size: 14px; color: #64748b; }

/* Error */
.error-box {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #b91c1c;
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 14px;
  text-align: center;
  display: none;
  margin-bottom: 16px;
}

/* Guardando overlay */
.overlay {
  position: fixed; inset: 0;
  background: rgba(255,255,255,.9);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  z-index: 99;
}
.overlay.visible { display: flex; }
.overlay .spinner { border-top-color: #2563eb; }
.overlay p { font-size: 15px; color: #1e293b; font-weight: 600; }

@media (min-width: 500px) {
  .tipo-card { padding: 20px 22px; }
  .tipo-ico  { width: 56px; height: 56px; font-size: 24px; }
  .tipo-info strong { font-size: 17px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <img src="/icon-192.png" alt="Trabajos Cerca">
    <span>Trabajos Cerca</span>
  </div>
</div>

<!-- CONTENIDO -->
<div class="wrap">

  <!-- Spinner de verificación inicial -->
  <div class="cargando" id="cargando">
    <div class="spinner"></div>
    <p>Verificando tu cuenta...</p>
  </div>

  <!-- Contenido principal (oculto hasta verificar) -->
  <div id="contenido" style="display:none">
    <div class="bienvenida">
      <h1>¿Cómo querés hacerte<br>conocer en Trabajos Cerca?</h1>
      <p>Elegí tu tipo de perfil. Podés actualizar esta elección más adelante desde tu configuración.</p>
    </div>

    <div class="error-box" id="errBox"></div>

    <div class="tipos-grid">

      <button class="tipo-card" data-tipo="oficio" onclick="elegir('oficio')">
        <div class="tipo-ico"><i class="fa-solid fa-wrench"></i></div>
        <div class="tipo-info">
          <strong>Ofrezco un oficio</strong>
          <span>Plomero, electricista, carpintero, pintor, gasista y más. Llegá a los vecinos que te necesitan.</span>
        </div>
      </button>

      <button class="tipo-card" data-tipo="profesional" onclick="elegir('profesional')">
        <div class="tipo-ico"><i class="fa-solid fa-user-tie"></i></div>
        <div class="tipo-info">
          <strong>Soy profesional</strong>
          <span>Contador, arquitecto, abogado, médico, ingeniero y otros. Conseguí clientes de tu rubro cerca tuyo.</span>
        </div>
      </button>

      <button class="tipo-card" data-tipo="cv" onclick="elegir('cv')">
        <div class="tipo-ico"><i class="fa-solid fa-file-lines"></i></div>
        <div class="tipo-info">
          <strong>Busco trabajo</strong>
          <span>Publicá tu CV y dejá que empresas y comercios de tu zona te encuentren.</span>
        </div>
      </button>

      <button class="tipo-card" data-tipo="emprendimiento" onclick="elegir('emprendimiento')">
        <div class="tipo-ico"><i class="fa-solid fa-rocket"></i></div>
        <div class="tipo-info">
          <strong>Tengo un emprendimiento</strong>
          <span>Mostrá qué vendés o qué ofrecés. Hacé crecer tu negocio con clientes de la zona.</span>
        </div>
      </button>

      <button class="tipo-card" data-tipo="empresa" onclick="elegir('empresa')">
        <div class="tipo-ico"><i class="fa-solid fa-building"></i></div>
        <div class="tipo-info">
          <strong>Soy empresa o comercio</strong>
          <span>Publicá puestos de trabajo y encontrá el candidato ideal entre los vecinos de tu zona.</span>
        </div>
      </button>

    </div>
  </div>
</div>

<!-- Overlay de guardando -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p>Configurando tu perfil...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPA_URL = 'https://iqeiszkoifxgygoqvbem.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZWlzemtvaWZ4Z3lnb3F2YmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTEzODIsImV4cCI6MjA5NDc4NzM4Mn0.qxt70TPbARPcMc8HhHx2A2QnfBvJLCrnrH4m36IcENs'
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY)

var currentUser = null

async function init() {
  var sesRes  = await supa.auth.getSession()
  var session = sesRes.data?.session

  if(!session) {
    window.location.href = '/login.html'
    return
  }
  currentUser = session.user

  // Si ya tiene tipo asignado, ir directo al perfil
  var perfilRes = await supa.from('perfiles').select('tipo').eq('id', currentUser.id).maybeSingle()
  if(perfilRes.data?.tipo) {
    window.location.href = '/perfil.html'
    return
  }

  // Mostrar selector
  document.getElementById('cargando').style.display   = 'none'
  document.getElementById('contenido').style.display  = 'block'
}

async function elegir(tipo) {
  document.getElementById('errBox').style.display = 'none'
  document.getElementById('overlay').classList.add('visible')

  var res = await supa.from('perfiles').upsert({
    id:   currentUser.id,
    tipo: tipo
  })

  if(res.error) {
    document.getElementById('overlay').classList.remove('visible')
    var err = document.getElementById('errBox')
    err.textContent = 'No se pudo guardar. Intentá de nuevo.'
    err.style.display = 'block'
    return
  }

  // Referidos pendientes
  var ref = localStorage.getItem('tc_ref')
  if(ref && ref !== currentUser.id) {
    try {
      var ya = await supa.from('referidos').select('id').eq('referido_id', currentUser.id).maybeSingle()
      if(!ya.data) {
        await supa.from('referidos').insert({ referidor_id: ref, referido_id: currentUser.id })
        var rp = await supa.from('perfiles').select('puntos_referidos').eq('id', ref).single()
        var pts = (rp.data?.puntos_referidos || 0) + 1
        await supa.from('perfiles').update({ puntos_referidos: pts }).eq('id', ref)
      }
      localStorage.removeItem('tc_ref')
    } catch(err) { console.warn('referido:', err) }
  }

  window.location.href = '/perfil.html'
}

init()
</script>
</body>
</html>
