<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<title>Ingresando — Trabajos Cerca</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #f1f5f9;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  padding: 24px;
  text-align: center;
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.logo img { width: 44px; height: 44px; border-radius: 12px; }
.logo span { font-size: 20px; font-weight: 800; color: #1e293b; }
.spinner {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 4px solid #e2e8f0;
  border-top-color: #2563eb;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
p { font-size: 15px; color: #64748b; }
</style>
</head>
<body>
<div class="logo">
  <img src="/icon-192.png" alt="Trabajos Cerca">
  <span>Trabajos Cerca</span>
</div>
<div class="spinner"></div>
<p>Verificando tu cuenta...</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPA_URL = 'https://iqeiszkoifxgygoqvbem.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZWlzemtvaWZ4Z3lnb3F2YmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTEzODIsImV4cCI6MjA5NDc4NzM4Mn0.qxt70TPbARPcMc8HhHx2A2QnfBvJLCrnrH4m36IcENs'
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY)

async function init() {
  // Esperar a que Supabase procese el hash OAuth
  await new Promise(function(r) { setTimeout(r, 1000) })

  var sesRes  = await supa.auth.getSession()
  var session = sesRes.data?.session

  if(!session) {
    window.location.href = '/login.html'
    return
  }

  var user = session.user

  // Guardar datos básicos de Google si no tiene perfil
  var perfilRes = await supa.from('perfiles').select('id, tipo').eq('id', user.id).maybeSingle()

  var tipoParam = new URLSearchParams(window.location.search).get('tipo') || null

  if(!perfilRes.data) {
    // Usuario nuevo de Google — crear perfil básico
    var meta     = user.user_metadata || {}
    var partes   = (meta.full_name || meta.name || '').trim().split(' ')
    var nombre   = partes[0] || ''
    var apellido = partes.slice(1).join(' ') || ''

    await supa.from('perfiles').upsert({
      id:       user.id,
      nombre:   nombre,
      apellido: apellido,
      email:    user.email,
      tipo:     tipoParam
    })
  }

  // Redirigir según tipo elegido antes del registro
  var destino = '/perfil.html'
  if(tipoParam === 'oficio' || tipoParam === 'profesional') destino = '/perfil_servicio.html'
  else if(tipoParam === 'emprendimiento')                    destino = '/perfil_servicio.html?tipo=emprendimiento'
  else if(tipoParam === 'cv')                               destino = '/perfil_cv.html'
  // Si ya tenía perfil con tipo guardado, respetarlo
  else if(perfilRes.data?.tipo === 'oficio' || perfilRes.data?.tipo === 'profesional') destino = '/perfil_servicio.html'
  else if(perfilRes.data?.tipo === 'emprendimiento') destino = '/perfil_servicio.html?tipo=emprendimiento'
  else if(perfilRes.data?.tipo === 'cv')             destino = '/perfil_cv.html'
  else if(tipoParam === 'cliente' || perfilRes.data?.tipo === 'cliente') destino = '/buscador.html'

  window.location.href = destino
}

init()
</script>
</body>
</html>
