<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — Trabajos Cerca</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="topbar">
  <div class="logo">
    <a href="/index.html"><img src="logo.png" alt="Trabajos Cerca"></a>
  </div>
</header>

<div class="container">

  <h2><i class="fa-solid fa-right-to-bracket" style="color:#2563eb"></i> Iniciar sesión</h2>

  <label>Email</label>
  <input id="email" type="email" placeholder="tu@email.com">

  <label>Contraseña</label>
  <input id="password" type="password" placeholder="Tu contraseña">

  <div id="msg"></div>

  <button class="btn btn-primary" onclick="login()">Entrar</button>

  <div class="sep">o</div>
  <p class="text-center" style="margin:0;">
    <a href="/registro.html">¿No tenés cuenta? Registrate gratis</a>
  </p>

</div>

<script type="module" src="/login.js"></script>

</body>
</html>
