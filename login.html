<body>

<header class="topbar">
  <div class="logo">
    <a href="/index.html"><img src="logo.png" alt="Trabajos Cerca"></a>
  </div>
</header>

<div class="container">

  <h2><i class="fa-solid fa-right-to-bracket" style="color:#2563eb"></i> Iniciar sesión</h2>

  <button class="btn-google" onclick="loginConGoogle()">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
    Continuar con Google
  </button>

  <div class="sep">o entrá con tu email</div>

  <label>Email</label>
  <input id="email" type="email" placeholder="tu@email.com">

  <label>Contraseña</label>
  <input id="password" type="password" placeholder="Tu contraseña">

  <div id="msg"></div>

  <button class="btn btn-primary" onclick="login()">Entrar</button>

  <p class="text-center" style="margin:4px 0 0;">
    <a href="#" onclick="mostrarRecuperarPass(event)" style="font-size:13px;color:#64748b;">
      ¿Olvidiste tu contraseña?
    </a>
  </p>

  <!-- Panel recuperar contraseña -->
  <div id="panelRecuperar" style="display:none;margin-top:16px;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:12px;padding:18px;">
    <p style="margin:0 0 12px;font-size:14px;font-weight:700;color:#0369a1;">
      <i class="fa-solid fa-envelope"></i> Recuperar contraseña
    </p>
    <p style="margin:0 0 12px;font-size:13px;color:#64748b;line-height:1.5;">
      Ingresá tu email y te enviamos un enlace para crear una nueva contraseña.
    </p>
    <input id="emailRecuperar" type="email" placeholder="tu@email.com"
      style="width:100%;padding:10px 13px;border:1.5px solid #bae6fd;border-radius:9px;
      font-size:14px;font-family:inherit;box-sizing:border-box;margin-bottom:10px;">
    <div id="msgRecuperar" style="margin-bottom:8px;font-size:13px;"></div>
    <button onclick="enviarRecuperacion()"
      style="width:100%;padding:11px;background:#0369a1;color:white;border:none;border-radius:9px;
      font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">
      <i class="fa-solid fa-paper-plane"></i> Enviar enlace de recuperación
    </button>
  </div>

  <div class="sep">o</div>
  <p class="text-center" style="margin:0;">
    <a href="/registro.html">¿No tenés cuenta? Registrate gratis</a>
  </p>

</div>

<script type="module" src="/login.js"></script>

<script src="/splash.js"></script>
</body>
</html>
