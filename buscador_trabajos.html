<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofertas de Trabajo en Argentina — Trabajos Cerca</title>
<meta name="description" content="Encontrá ofertas de trabajo y empresas que buscan empleados cerca tuyo en Argentina. Postulate directo por WhatsApp sin intermediarios.">
<meta name="keywords" content="ofertas de trabajo argentina, buscar trabajo cerca, empleos cerca, trabajo en mi ciudad, busco empleo argentina, trabajos cerca">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://trabajocerca.vercel.app/buscador_trabajos.html">
<meta property="og:type" content="website">
<meta property="og:url" content="https://trabajocerca.vercel.app/buscador_trabajos.html">
<meta property="og:title" content="Ofertas de Trabajo en tu Ciudad — Trabajos Cerca">
<meta property="og:description" content="Buscá trabajo cerca tuyo. Empresas y personas que buscan empleados en toda Argentina.">
<meta property="og:image" content="https://trabajocerca.vercel.app/og-image.png">
<meta property="og:site_name" content="Trabajos Cerca">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="topbar">
  <div class="logo">
    <a href="/index.html"><img src="logo.png" alt="Trabajos Cerca"></a>
  </div>
  <nav>
    <a href="/index.html"><i class="fa-solid fa-house"></i> <span>Inicio</span></a>
    <a href="/perfil.html"><i class="fa-solid fa-user"></i> <span>Perfil</span></a>
  </nav>
</header>

<div class="container" style="max-width:860px;">

  <h2><i class="fa-solid fa-briefcase" style="color:#2563eb"></i> Buscador de Trabajos</h2>
  <p style="color:#64748b;font-size:14px;margin:-8px 0 20px;">Empresas y personas que buscan empleados en tu zona</p>

  <div class="filtros">
    <div>
      <label>Ciudad</label>
      <input id="ciudad" placeholder="Ej: La Plata, Rosario...">
    </div>
    <div>
      <label>&nbsp;</label>
      <button class="btn btn-primary" onclick="buscar()" style="white-space:nowrap;">
        <i class="fa-solid fa-magnifying-glass"></i> Buscar
      </button>
    </div>
  </div>

  <div id="resultados">
    <div style="text-align:center;padding:50px 20px;color:#94a3b8;">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:36px;display:block;margin-bottom:14px;"></i>
      <p>Cargando...</p>
    </div>
  </div>

</div>

<!-- MODAL PERFIL EMPLEADOR -->
<div class="modal-overlay" id="empModalOverlay" onclick="cerrarModalEmpClick(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="cerrarModalEmp()">×</button>
    <div class="modal-content" id="empModalContent"></div>
  </div>
</div>

<script src="buscador_trabajos.js"></script>
<script src="/chat_widget.js"></script>
</body>
</html>
