<!-- Banner inline entre perfiles (usa config dinámica si existe) -->
<script>
(function(){
  const SUPA_URL = 'https://iqeiszkoifxgygoqvbem.supabase.co'
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZWlzemtvaWZ4Z3lnb3F2YmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTEzODIsImV4cCI6MjA5NDc4NzM4Mn0.qxt70TPbARPcMc8HhHx2A2QnfBvJLCrnrH4m36IcENs'

  var imagenes = [
    '/banner-pub-albanil.jpg',
    '/banner-pub-empresa.jpg',
    '/banner-pub-profesional.jpg',
    '/banner-pub-tech.jpg',
    '/banner-pub-oficina.jpg'
  ]
  var links       = []
  var cadaCuantos = 3
  var imgIdx      = 0

  // Cargar config dinámica del admin
  fetch(SUPA_URL + '/rest/v1/configuracion?clave=eq.pub_config&select=valor', {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  }).then(function(r){ return r.json() }).then(function(rows){
    if(!rows?.[0]?.valor) return
    try {
      var cfg = JSON.parse(rows[0].valor)
      if(cfg.oficios?.imagenes?.length) imagenes = cfg.oficios.imagenes
      if(cfg.oficios?.links?.length)    links    = cfg.oficios.links
      if(cfg.oficios?.cada)             cadaCuantos = cfg.oficios.cada
    } catch(e){}
  }).catch(function(){})

  function crearBanner(){
    var idx2 = imgIdx % imagenes.length
    var a = document.createElement('a')
    var link = links[idx2] || ''
    a.href   = link ? (link.startsWith('http') ? link : 'https://' + link) : '/perfil_servicio.html?tipo=oficio'
    a.target = link ? '_blank' : '_self'
    a.rel    = link ? 'noopener noreferrer' : ''
    a.className = 'banner-entre-perfiles'
    a.title = 'Publicita aquí en Trabajos Cerca'
    var img = document.createElement('img')
    img.src = imagenes[idx2]
    img.alt = 'Publicita aquí'
    img.loading = 'lazy'
    imgIdx++
    a.appendChild(img)
    return a
  }

  function inyectarBanners(){
    var resultados = document.getElementById('resultados')
    if(!resultados) return
    resultados.querySelectorAll('.banner-entre-perfiles').forEach(function(b){ b.remove() })
    imgIdx = 0
    var cards = Array.from(resultados.querySelectorAll('.card'))
    cards.forEach(function(card, i){
      if((i + 1) % cadaCuantos === 0 && i < cards.length - 1){
        card.parentNode.insertBefore(crearBanner(), card.nextSibling)
      }
    })
  }

  var observer = new MutationObserver(function(mutations){
    var hayCards = mutations.some(function(m){
      return Array.from(m.addedNodes).some(function(n){ return n.classList && n.classList.contains('card') })
    })
    if(hayCards) setTimeout(inyectarBanners, 50)
  })

  document.addEventListener('DOMContentLoaded', function(){
    var resultados = document.getElementById('resultados')
    if(resultados) observer.observe(resultados, { childList:true, subtree:false })
  })
})()
</script>
