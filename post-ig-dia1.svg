<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

  <!-- Fondo principal -->
  <rect width="1080" height="1080" fill="#185FA5"/>

  <!-- Banda decorativa superior -->
  <rect x="0" y="0" width="1080" height="8" fill="#378ADD"/>

  <!-- Badge "Trabajos Cerca" -->
  <rect x="72" y="72" width="240" height="44" rx="22" fill="#E6F1FB"/>
  <text x="192" y="100" text-anchor="middle" font-size="22" font-weight="700" fill="#0C447C">Trabajos Cerca</text>

  <!-- Emoji gota grande -->
  <text x="72" y="310" font-size="180">💧</text>

  <!-- Título principal -->
  <text x="72" y="440" font-size="82" font-weight="900" fill="#FFFFFF">¿Necesitás</text>
  <text x="72" y="536" font-size="82" font-weight="900" fill="#FFFFFF">un plomero</text>
  <text x="72" y="632" font-size="82" font-weight="900" fill="#5DCAA5">ya?</text>

  <!-- Subtítulo -->
  <text x="72" y="706" font-size="36" fill="#B5D4F4">¿Pérdida de agua? ¿Caño roto?</text>
  <text x="72" y="752" font-size="36" fill="#B5D4F4">Encontrá uno disponible ahora</text>
  <text x="72" y="798" font-size="36" fill="#B5D4F4">en tu ciudad.</text>

  <!-- Checks -->
  <!-- Check 1 -->
  <circle cx="100" cy="876" r="18" fill="#5DCAA5"/>
  <text x="100" y="884" text-anchor="middle" font-size="22" font-weight="900" fill="#04342C">✓</text>
  <text x="134" y="884" font-size="32" fill="#E6F1FB">Contacto directo por WhatsApp</text>

  <!-- Check 2 -->
  <circle cx="100" cy="934" r="18" fill="#5DCAA5"/>
  <text x="100" y="942" text-anchor="middle" font-size="22" font-weight="900" fill="#04342C">✓</text>
  <text x="134" y="942" font-size="32" fill="#E6F1FB">Sin intermediarios ni comisiones</text>

  <!-- Check 3 -->
  <circle cx="100" cy="992" r="18" fill="#5DCAA5"/>
  <text x="100" y="1000" text-anchor="middle" font-size="22" font-weight="900" fill="#04342C">✓</text>
  <text x="134" y="1000" font-size="32" fill="#E6F1FB">100% gratis</text>

  <!-- Footer -->
  <rect x="0" y="1032" width="1080" height="48" fill="#0C447C"/>
  <text x="72" y="1064" font-size="26" font-weight="700" fill="#85B7EB">trabajoscerca.com.ar</text>
  <text x="1008" y="1064" text-anchor="end" font-size="22" fill="#5DCAA5">#PlomeroArgentina  #TrabajosArgentina</text>

</svg>
