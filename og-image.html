<!DOCTYPE html>
<!-- Este archivo es solo para generar og-image.png con una captura.
     Abrir en el navegador, hacer captura de 1200x630px y guardar como og-image.png -->
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
  body {
    width:1200px; height:630px; overflow:hidden;
    background: linear-gradient(135deg, #7c3aed 0%, #2563eb 50%, #0ea5e9 100%);
    display:flex; align-items:center; justify-content:space-between;
    padding: 60px 80px; position:relative;
  }
  body::before {
    content:"";position:absolute;inset:0;
    background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M0 0h40v40H0V0zm40 40h40v40H40V40z'/%3E%3C/g%3E%3C/svg%3E");
  }
  .left { flex:1; z-index:1; }
  .tag {
    display:inline-block; background:rgba(255,255,255,.2); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.3); border-radius:30px;
    padding:8px 20px; color:white; font-size:16px; font-weight:700;
    letter-spacing:.06em; text-transform:uppercase; margin-bottom:28px;
  }
  h1 {
    color:white; font-size:62px; font-weight:900; line-height:1.1;
    margin-bottom:20px; text-shadow:0 2px 20px rgba(0,0,0,.2);
  }
  h1 span { color:#fde68a; }
  p { color:rgba(255,255,255,.85); font-size:24px; line-height:1.5; margin-bottom:36px; }
  .pills { display:flex; gap:12px; flex-wrap:wrap; }
  .pill {
    background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25);
    border-radius:20px; padding:8px 18px;
    color:white; font-size:16px; font-weight:600;
  }
  .right { z-index:1; text-align:center; padding-left:60px; flex-shrink:0; }
  .circle {
    width:220px; height:220px; border-radius:50%;
    background:rgba(255,255,255,.15); backdrop-filter:blur(10px);
    border:3px solid rgba(255,255,255,.3);
    display:flex; align-items:center; justify-content:center;
    font-size:90px; margin-bottom:20px;
  }
  .url {
    background:white; border-radius:16px; padding:12px 24px;
    font-size:18px; font-weight:900; color:#7c3aed;
  }
</style>
</head>
<body>
  <div class="left">
    <div class="tag">🇦🇷 Argentina</div>
    <h1>Trabajos<br><span>Cerca</span></h1>
    <p>Plomeros, electricistas, contadores<br>y más de 30 oficios en tu ciudad</p>
    <div class="pills">
      <span class="pill">🔍 Buscador</span>
      <span class="pill">🗺️ Mapa en vivo</span>
      <span class="pill">💬 WhatsApp directo</span>
      <span class="pill">🆓 100% Gratis</span>
    </div>
  </div>
  <div class="right">
    <div class="circle">🔨</div>
    <div class="url">trabajoscerca.com.ar</div>
  </div>
</body>
</html>
