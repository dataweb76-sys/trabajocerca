<!-- MODAL PERFIL CV -->

<script>
/* ── Verificar que esté logueado para ver CVs ── */
(function verificarAcceso() {
  function getToken(){
    const claves = ["sb-iqeiszkoifxgygoqvbem-auth-token","supabase.auth.token"]
    for(const k of claves){
      try { const t = JSON.parse(localStorage.getItem(k))?.access_token; if(t) return t } catch(e){}
    }
    try {
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i)
        if(!k||(!k.includes("supabase")&&!k.includes("sb-"))) continue
        const t=JSON.parse(localStorage.getItem(k))?.access_token
        if(t) return t
      }
    } catch(e){}
    return null
  }

  if(getToken()) {
    // Logueado → lanzar búsqueda
    if(window._cvBuscarDisponible) buscar()
    return
  }

  // No logueado → mostrar invitación amigable
  const res = document.getElementById("resultados")
  const filtros = document.querySelector(".filtros")
  if(filtros) filtros.style.display = "none"
  if(res) res.innerHTML = `
    <div style="text-align:center;padding:50px 20px;">
      <div style="font-size:52px;margin-bottom:14px;">📄</div>
      <h3 style="color:#1e293b;margin-bottom:8px;">Registrate para ver los CVs</h3>
      <p style="color:#64748b;font-size:14px;margin-bottom:6px;line-height:1.6;">
        Cualquier persona puede buscar candidatos en Trabajos Cerca.<br>
        Solo necesitás tener una cuenta — ¡es gratis!
      </p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px;">
        <a href="/login.html?next=/buscador_cv.html" class="btn btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;">
          <i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión
        </a>
        <a href="/registro.html" class="btn btn-outline" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;">
          <i class="fa-solid fa-user-plus"></i> Registrarme gratis
        </a>
      </div>
    </div>`
})()
</script>
