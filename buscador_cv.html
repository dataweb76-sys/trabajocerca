<body>

<header class="topbar">
  <div class="logo">
    <a href="/index.html"><img src="logo.png" alt="Trabajos Cerca"></a>

  <nav>
    <a href="/index.html"><i class="fa-solid fa-house"></i> <span>Inicio</span></a>
    <a href="/pedidos.html"><i class="fa-solid fa-clipboard-list"></i> <span>Pedidos</span></a>

    <a href="/perfil.html"><i class="fa-solid fa-user"></i> <span>Perfil</span></a>
  </nav>
</header>

<div class="container" style="max-width:860px;">

  <h2><i class="fa-solid fa-file-lines" style="color:#16a34a"></i> Buscador de CV Trabajadores</h2>
  <p style="color:#64748b;font-size:14px;margin:-8px 0 20px;">Encontrá personas en búsqueda activa de empleo en tu zona</p>

  <div class="filtros">
    <div>
      <label>Profesión o habilidad</label>
      <input id="buscar" placeholder="Ej: contador, vendedor, electricista...">
    </div>
    <div>
      <label>Ciudad</label>
      <input id="ciudad" placeholder="Ej: La Plata">
    </div>
    <div>
      <label>&nbsp;</label>
      <button class="btn btn-primary" onclick="buscar()" style="white-space:nowrap;">
        <i class="fa-solid fa-magnifying-glass"></i> Buscar
      </button>
    </div>
  </div>

  <div id="resultados">
    <div style="text-align:center;padding:50px 20px;color:#94a3b8;">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:36px;display:block;margin-bottom:14px;"></i>
      <p>Cargando...</p>
    </div>
  </div>

</div>

<!-- MODAL PERFIL CV -->
<div class="modal-overlay" id="cvModalOverlay" onclick="cerrarModalCVClick2(event)">
  <div class="modal-box" id="cvModalBox">
    <button class="modal-close" onclick="cerrarModalCV2()">×</button>
    <div class="modal-content" id="cvModalContent"></div>
  </div>
</div>

<script src="buscador_cv.js"></script>
<script src="/chat_widget.js"></script>
<script src="/splash.js"></script>
<script>
/* ── Solo empresas pueden ver CVs ── */
(async function verificarAccesoEmpresa() {
  const SB_URL = "https://iqeiszkoifxgygoqvbem.supabase.co"
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZWlzemtvaWZ4Z3lnb3F2YmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTEzODIsImV4cCI6MjA5NDc4NzM4Mn0.qxt70TPbARPcMc8HhHx2A2QnfBvJLCrnrH4m36IcENs"

  function getToken(){
    try { return JSON.parse(localStorage.getItem("sb-iqeiszkoifxgygoqvbem-auth-token"))?.access_token || null } catch(e){ return null }
  }
  function getUserId(){
    const t = getToken(); if(!t) return null
    try { return JSON.parse(atob(t.split(".")[1])).sub || null } catch(e){ return null }
  }

  const bloqueado = document.getElementById("resultados")

  function mostrarBloqueo(html) {
    // Ocultar filtros
    var filtros = document.querySelector(".filtros")
    if(filtros) filtros.style.display = "none"
    bloqueado.innerHTML = html
  }

  const uid = getUserId()
  if(!uid) {
    mostrarBloqueo(`
      <div style="text-align:center;padding:50px 20px;">
        <div style="font-size:48px;margin-bottom:14px;">🔒</div>
        <h3 style="color:#1e293b;margin-bottom:8px;">Sección exclusiva para empresas</h3>
        <p style="color:#64748b;font-size:14px;margin-bottom:20px;">Solo las empresas y comercios registrados pueden buscar candidatos.</p>
        <a href="/login.html" class="btn btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;">
          <i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión
        </a>
        <br><br>
        <a href="/registro.html" style="font-size:13px;color:#0369a1;">¿No tenés cuenta? Registrate como empresa</a>
      </div>`)
    return
  }

  // Verificar tipo del perfil
  try {
    const res = await fetch(SB_URL + '/rest/v1/perfiles?id=eq.' + uid + '&select=tipo', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() }
    })
    if(res.ok) {
      const data = await res.json()
      const tipo = data?.[0]?.tipo
      if(tipo !== 'empresa') {
        mostrarBloqueo(`
          <div style="text-align:center;padding:50px 20px;">
            <div style="font-size:48px;margin-bottom:14px;">🏢</div>
            <h3 style="color:#1e293b;margin-bottom:8px;">Acceso exclusivo para empresas</h3>
            <p style="color:#64748b;font-size:14px;margin-bottom:6px;">Tu cuenta está registrada como <strong>${tipo || 'usuario'}</strong>.</p>
            <p style="color:#64748b;font-size:14px;margin-bottom:20px;">Solo las cuentas de tipo <strong>Empresa / Comercio</strong> pueden ver los CVs de candidatos.</p>
            <a href="/perfil_servicio.html" style="font-size:13px;color:#0369a1;">¿Sos una empresa? Actualizá tu perfil</a>
          </div>`)
      } else {
        // Es empresa → lanzar la búsqueda ahora que está verificado
        if(window._cvBuscarDisponible) buscar()
      }
    }
  } catch(e) {
    // Si falla la verificación, dejar que el usuario busque igual
    if(window._cvBuscarDisponible) buscar()
  }
})()
</script>
</body>
</html>
