<title>Buscador de Personas que Buscan Trabajo en Argentina — Trabajos Cerca</title>
<meta name="description" content="Encontrá empleados en tu zona. Buscá personas con experiencia en distintos rubros que están buscando trabajo en Argentina. Contacto directo por WhatsApp.">
<meta name="keywords" content="buscar empleados argentina, curriculos cerca, buscar personal, trabajadores disponibles, contratar personal argentina, trabajos cerca">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://trabajoscerca.com.ar/buscador_cv.html">
<meta property="og:type" content="website">
<meta property="og:url" content="https://trabajoscerca.com.ar/buscador_cv.html">
<meta property="og:title" content="Buscador de Candidatos — Trabajos Cerca">
<meta property="og:description" content="Encontrá personas que buscan trabajo en tu ciudad. Contacto directo, sin intermediarios.">
<meta property="og:image" content="https://trabajoscerca.com.ar/og-image.png">
<meta property="og:site_name" content="Trabajos Cerca">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="topbar">
  <div class="logo">
    <a href="/index.html"><img src="logo.png" alt="Trabajos Cerca"></a>
  </div>
  <nav>
    <a href="/index.html"><i class="fa-solid fa-house"></i> <span>Inicio</span></a>
    <a href="/pedidos.html"><i class="fa-solid fa-clipboard-list"></i> <span>Pedidos</span></a>
    <a href="/mensajes.html"><i class="fa-solid fa-comment-dots"></i> <span>Mensajes</span></a>
    <a href="/perfil.html"><i class="fa-solid fa-user"></i> <span>Perfil</span></a>
  </nav>
</header>

<div class="container" style="max-width:860px;">

  <h2><i class="fa-solid fa-file-lines" style="color:#16a34a"></i> Buscador de CV Trabajadores</h2>
  <p style="color:#64748b;font-size:14px;margin:-8px 0 20px;">Encontrá personas en búsqueda activa de empleo en tu zona</p>

  <div class="filtros">
    <div>
      <label>Profesión o habilidad</label>
      <input id="buscar" placeholder="Ej: contador, vendedor, electricista...">
    </div>
    <div>
      <label>Ciudad</label>
      <input id="ciudad" placeholder="Ej: La Plata">
    </div>
    <div>
      <label>&nbsp;</label>
      <button class="btn btn-primary" onclick="buscar()" style="white-space:nowrap;">
        <i class="fa-solid fa-magnifying-glass"></i> Buscar
      </button>
    </div>
  </div>

  <div id="resultados">
    <div style="text-align:center;padding:50px 20px;color:#94a3b8;">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:36px;display:block;margin-bottom:14px;"></i>
      <p>Cargando...</p>
    </div>
  </div>

</div>

<!-- MODAL PERFIL CV -->
<div class="modal-overlay" id="cvModalOverlay" onclick="cerrarModalCVClick2(event)">
  <div class="modal-box" id="cvModalBox">
    <button class="modal-close" onclick="cerrarModalCV2()">×</button>
    <div class="modal-content" id="cvModalContent"></div>
  </div>
</div>

<script src="buscador_cv.js"></script>
<script src="/chat_widget.js"></script>
<script src="/splash.js"></script>
</body>
</html>
